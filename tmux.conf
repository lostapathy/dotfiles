# Force color terminal
set -g default-terminal "xterm-256color"
set -as terminal-features ",xterm-256color:RGB"

# address vim mode switching delay (http://superuser.com/a/252717/65504)
set -s escape-time 0

# increase scrollback buffer size
set -g history-limit 50000

# tmux messages are displayed for 4 seconds
set -g display-time 4000

# refresh 'status-left' and 'status-right' more often
set -g status-interval 5

# emacs key bindings in tmux command prompt (prefix + :) are better than
# vi keys, even for vim users
set -g status-keys vi

# focus events enabled for terminals that support them
set -g focus-events on

# super useful when using "grouped sessions" and multi-monitor setup
setw -g aggressive-resize on

# https://dev.to/mrtnrdl/switching-from-gnu-screen-to-tmux-21ag
# set prefix to ctrl+a
unbind C-b
set -g prefix C-a

# toggling windows with ctrl+a ctrl+a
bind-key C-a last-window

# jump to the beginning of the line
bind a send-prefix

# don't rename windows automatically
set-option -g allow-rename off

# start with window number 1
set -g base-index 0

# Notifying if other windows has activities
setw -g monitor-activity on

# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

bind '"' run-shell 'S=$(tmux display -p "##S"); tmux choose-tree -wf "##{==:##{session_name},$S}"'
unbind "'"
bind "'" choose-tree -w

# vim copy mode
bind P paste-buffer
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle
# bind -t vi-copy y copy-pipe "xclip -sel clip -i"

# statusbar
set -g status-position bottom
set -g status-justify left
set -g status on

# Inactive windows
set -g window-status-format " #I:#W "
set -g window-status-style fg=colour244,bg=colour237,fill=colour237
#set -g window-status-style fg=colour244,bg=colour244
# set -g status-format "#[fill=bgcolour244]"
# set -g status-format "#[fill=colour244]"

# Active window (Gruvbox blue accent)
# set -g window-status-current-format "#[bold] #I #W #[default]"
set -g window-status-current-format " #[bold,bg=colour109,fg=colour237] #I:#W #[default]"
set -g window-status-current-style bg=colour109,fg=colour237
set -g window-status-current-format " #[reverse] #I:#W #[noreverse]"
set -g window-status-current-style bg=colour208,fg=colour237

# Left side (hostname)
set -g status-left " #[fg=colour142,bg=colour237]#H #[fg=colour244]| "

# Right side (load + date + time)
set -g status-right "#[fg=colour142,bg=colour237]Load: #(cut -d ' ' -f1-3 /proc/loadavg) | %H:%M "

# set -g status-left "#H (load: #(cut -d ' ' -f1-3 /proc/loadavg)) "
# set -g status-right "%d.%m.%Y %H:%M "







#+----------------+
#+ Plugin Support +
#+----------------+
#+--- tmux-prefix-highlight ---+
set -g @prefix_highlight_fg black
set -g @prefix_highlight_bg brightcyan

#+---------+
#+ Options +
#+---------+
set -g status-interval 1
set -g status on

#+--------+
#+ Status +
#+--------+
#+--- Layout ---+
set -g status-justify left

#+--- Colors ---+
set -g status-style bg=black,fg=white

#+-------+
#+ Panes +
#+-------+
set -g pane-border-style bg=default,fg=brightblack
set -g pane-active-border-style bg=default,fg=blue
set -g display-panes-colour black
set -g display-panes-active-colour brightblack

#+------------+
#+ Clock Mode +
#+------------+
setw -g clock-mode-colour cyan

#+----------+
#+ Messages +
#+---------+
set -g message-style bg=brightblack,fg=cyan
set -g message-command-style bg=brightblack,fg=cyan


# Vim bindings to switch panes
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind C-j resize-pane -D 10
bind C-k resize-pane -U 10
bind C-l resize-pane -R 10
bind C-h resize-pane -L 10

# Refresh config file
unbind r
bind r source-file ~/.tmux.conf

set -g mouse on
